- name: install packages
  hosts: web
  become: yes

  tasks:
    - name: install packages
      ansible.builtin.package:
        name: "{{ item.name }}"
        state: "{{ item.state }}"

      loop:
        - { name: 'git', state: 'present' }
        - { name: 'ansible', state: 'absent' }  
      
